<!DOCTYPE html>
<html>

<head>
    <title> WORD SEARCH GAME </title>

    <meta charset="UTF-8">
    <meta name="author" content="cute si bree">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <table>
        <style>
            table {
                border: 3px solid black;
                border-spacing: 10px;
                margin-bottom: 20px;
                background-color: rgba(255, 255, 255, 0.4);
                padding: 15px;
                border-radius: 10px;
            }

            th,
            td {
                border: 3px solid black;
                padding: 10px;
                width: 100px;
                height: 30px;
                text-align: center;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: url("image2.jpg") no-repeat center center fixed;
                background-size: cover;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            input,
            button,
            p,
            a,
            h2 {
                margin: 8px 0;
                text-align: center;
            }

            .button {
                background-color: #F4C2C2;
                color: #555555;
                padding: 12px 28px;
                border: none;
                border-radius: 50px;
                cursor: pointer;
                font-size: 16px;
                font-weight: 600;

                transition: background-color 0.3s ease, transform 0.2s ease;
            }

            .button:hover {
                background-color: #C8ACA9;
                transform: translateY(-2px); 
            }
        </style>
        <caption>
            <h1> WORD SEARCH</h1>
            <h2>CATEGORY: FRUITS</h2>
        </caption>

        <colgroup>
            <col span="8" style="background: rgb(255, 255, 255)">
        </colgroup>

        <tr>
            <th>A</th>
            <th>K</th>
            <th>O</th>
            <th>L</th>
            <th>I</th>
            <th>M</th>
            <th>E</th>
            <th>C</th>
        </tr>

        <tr>
            <th>B</th>
            <th>I</th>
            <th>R</th>
            <th>E</th>
            <th>G</th>
            <th>E</th>
            <th>P</th>
            <th>A</th>
        </tr>

        <tr>
            <th>F</th>

            <th>M</th>
            <th>R</th>
            <th>L</th>
            <th>E</th>
            <th>P</th>
        </tr>

        <tr>
            <th>R</th>
            <th>I</th>
            <th>N</th>
            <th>P</th>
            <th>A</th>
            <th>O</th>
            <th>A</th>
            <th>R</th>
        </tr>

        <tr>
            <th>U</th>

            <th>G</th>
            <th>L</th>
            <th>P</th>
            <th>N</th>

        <tr>

    </table>



    <h2>Enter the word you found:</h2>

    <input type="text" id="userWord" placeholder="Type word here">
    <button onclick="checkWordEasyMode()">Submit</button>

    <p id="result"></p>
    <script src="script.js"></script>
    <a href="index.html"><button type="button"> Back To Home </button>

</body>

</html>
